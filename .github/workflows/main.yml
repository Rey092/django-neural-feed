name: Tests and Linting

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  UV_TORCH_BACKEND: cpu

jobs:
  linting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Run Black
        run: uvx black --check src/ tests/

      - name: Run Flake8
        run: uvx flake8 src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics

  tests:
    runs-on: ubuntu-latest
    needs: linting
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10","3.11", "3.12"]
        django-version: ["4.2", "5.0", "6.0"]

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: django_neural_feed_test_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: mysecretpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SETTINGS_MODULE: tests.settings
      DATABASE_HOST: localhost
      DATABASE_PORT: "5432"
      DATABASE_NAME: django_neural_feed_test_db
      DATABASE_USER: postgres
      DATABASE_PASSWORD: mysecretpassword

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv and Python
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: false

      - name: Get uv cache directory
        id: uv-cache
        run: echo "dir=$(uv cache dir)" >> $GITHUB_OUTPUT

      - name: Persistent uv cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.uv-cache.outputs.dir }}
          key: uv-wheels-${{ runner.os }}-${{ matrix.python-version }}-dj${{ matrix.django-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            uv-wheels-${{ runner.os }}-${{ matrix.python-version }}-dj${{ matrix.django-version }}-

      - name: Install dependencies
        env:
          UV_INDEX_URL: https://download.pytorch.org/whl/cpu
          UV_EXTRA_INDEX_URL: https://pypi.org/simple
        run: |
          uv pip install torch "django==${{ matrix.django-version }}"

          uv pip install -e '.[celery, dev]'

      - name: Run tests
        run: |
          .venv/bin/pytest --cov=django_neural_feed --cov-report=term-missing --cov-branch