name: Tests and Linting

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  UV_TORCH_BACKEND: cpu

jobs:
  linting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Run Black
        run: uvx black --check src/ tests/

      - name: Run Flake8
        run: uvx flake8 src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics

  tests:
    runs-on: ubuntu-latest
    needs: linting
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10"]
        django-version: ["4.2", "5.0"]

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: django_neural_feed_test_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SETTINGS_MODULE: tests.settings
      DATABASE_HOST: localhost
      DATABASE_PORT: "5432"
      DATABASE_NAME: django_neural_feed_test_db
      DATABASE_USER: postgres
      DATABASE_PASSWORD: password

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv and Python
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            requirements_dev.txt
          cache-suffix: "-dj${{ matrix.django-version }}"

      - name: Install dependencies
        run: |
          uv pip install torch "django==${{ matrix.django-version }}"

          if [ -f requirements_dev.txt ]; then
            uv pip install -r requirements_dev.txt
          fi

          uv pip install -e '.[celery]'

      - name: Run tests
        run: |
          .venv/bin/pytest --cov=django_neural_feed --cov-report=term-missing --cov-branch