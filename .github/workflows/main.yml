name: Tests and Linting

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  linting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Linting Tools
        run: |
          python -m pip install --upgrade pip
          pip install black flake8

      - name: Run Black (Code Formatting Check)
        run: black --check src/ tests/

      - name: Run Flake8 (Syntax and Style)
        run: flake8 src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics

  tests:
    runs-on: ubuntu-latest
    needs: linting
    timeout-minutes: 10
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        django-version: ["4.2", "5.0"]

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: django_neural_feed_test_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "django==${{ matrix.django-version }}"
          if [ -f requirements_dev.txt ]; then pip install -r requirements_dev.txt; fi
          pip install -e .[celery]
      - name: Enable pgvector extension
        env:
          PGPASSWORD: password
        run: |
          psql -h localhost -U postgres -d django_neural_feed_test_db \
            -c "CREATE EXTENSION IF NOT EXISTS vector;"
      - name: Run Tests
        run: |
          pytest
