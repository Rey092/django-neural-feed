name: Tests and Linting

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  linting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv and Python
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: "requirements_dev.txt"

      - name: Install Linting Tools
        run: |
          uv pip install black flake8

      - name: Run Black
        run: uv run black --check src/ tests/

      - name: Run Flake8
        run: uv run flake8 src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics

  tests:
    runs-on: ubuntu-latest
    needs: linting
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10"] #, "3.11", "3.12"]
        django-version: ["5.0"] #["4.2", "5.0"]

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: django_neural_feed_test_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SETTINGS_MODULE: tests.settings
      DATABASE_HOST: localhost
      DATABASE_PORT: "5432"
      DATABASE_NAME: django_neural_feed_test_db
      DATABASE_USER: postgres
      DATABASE_PASSWORD: password
      UV_CACHE_DIR: ${{ github.workspace }}/.uv-cache

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: false

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Create venv
        run: uv venv

      - name: Install Dependencies
        run: |
          uv pip install "django==${{ matrix.django-version }}"
          if [ -f requirements_dev.txt ]; then uv pip install -r requirements_dev.txt; fi
          uv pip install -e '.[celery]'

      - name: Run Tests
        run: |
          uv run pytest --cov=django_neural_feed --cov-report=term-missing --cov-branch