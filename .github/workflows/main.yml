name: Tests and Linting

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  linting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: 'pip'

      - name: Install Linting Tools
        run: |
          python -m pip install --upgrade pip
          pip install black flake8

      - name: Run Black (Code Formatting Check)
        run: black --check src/ tests/

      - name: Run Flake8 (Syntax and Style)
        run: flake8 src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics

  tests:
    runs-on: ubuntu-latest
    needs: linting
    timeout-minutes: 10
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        django-version: ["4.2", "5.0"]

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start PostgreSQL with pgvector
        run: |
          docker run -d \
            --name postgres \
            -p 5432:5432 \
            -e POSTGRES_DB=django_neural_feed_test_db \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=password \
            ghcr.io/pgvector/pgvector:pg16
          
          until docker exec postgres pg_isready; do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "django==${{ matrix.django-version }}"
          if [ -f requirements_dev.txt ]; then pip install -r requirements_dev.txt; fi
          pip install -e .[celery]

      - name: Run Tests
        run: |
          pytest --cov=django_neural_feed -s