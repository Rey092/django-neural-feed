name: Tests and Linting

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  linting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Linting Tools
        run: |
          python -m pip install --upgrade pip
          pip install black flake8

      - name: Run Black (Code Formatting Check)
        run: black --check django_neural_feed

      - name: Run Flake8 (Syntax and Style)
        run: flake8 django_neural_feed --count --select=E9,F63,F7,F82 --show-source --statistics

  tests:
    runs-on: ubuntu-latest
    needs: linting
    strategy:
      matrix:
        # Тестируем на разных версиях, чтобы гарантировать совместимость библиотеки
        python-version: ["3.10", "3.11", "3.12"]
        django-version: ["4.2", "5.0"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .[celery]

      - name: Run Tests
        run: |
          python runtests.py
